<html lang="en">
<body>
Reports FXML binding expressions that use compact notation (<code>$path</code>,
<code>${path}</code>, <code>#{path}</code>, etc.) and offers to convert them to
the equivalent long-form <code>{fx:&hellip;}</code> markup-extension notation.
<p>
Use <em>Fix all in file</em> or <em>Fix all in scope</em> to convert every compact
binding expression at once.
</body>
</html>
