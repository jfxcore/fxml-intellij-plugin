<html lang="en">
<body>
Reports <code>fx:id</code> attributes whose value is never used in the FXML file
or in the code-behind class.
<p>
An <code>fx:id</code> is considered used when a matching field or method exists
in the code-behind class, or when the value appears as a binding-path segment
in a binding expression in the same FXML file.
</body>
</html>
