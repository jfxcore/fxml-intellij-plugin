<html lang="en">
<body>
Reports FXML 2.0 binding expressions that use long-form <code>{fx:&hellip;}</code>
markup-extension notation and offers to convert them to the equivalent compact
notation (<code>$path</code>, <code>${path}</code>, <code>#{path}</code>, etc.).
<p>
Use <em>Fix all in file</em> or <em>Fix all in scope</em> to convert every long-form
binding expression at once.
</body>
</html>
