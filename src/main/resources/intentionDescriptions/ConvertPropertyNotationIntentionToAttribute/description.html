<html lang="en">
<body>
<p>
Converts a JavaFX property element to attribute notation.
</p>
<p>Transforms:</p>
<pre>
&lt;Button&gt;
    &lt;text&gt;Hello&lt;/text&gt;
&lt;/Button&gt;
</pre>
<div>
into <code>&lt;Button text="Hello"/&gt;</code>.
Only offered when the element contains plain text content (no child elements),
making it safe to represent as an attribute value.
</div>
</body>
</html>
